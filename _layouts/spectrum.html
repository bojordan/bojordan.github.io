---
layout: default
---

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/swift.min.js"></script>

<style>
  /* ---- Sidebar: floats in the left margin, outside the 800px container ---- */
  /* Positioned 20px left of the container's left edge.
     Container left edge = 50% - 400px, so sidebar left = 50% - 400px - 20px - 200px */
  .spectrum-sidebar {
    display: none;
    position: fixed;
    left: calc(50% - 620px);
    width: 200px;
    box-sizing: border-box;
    overflow-y: auto;
    max-height: calc(100vh - 40px);
    padding: 1rem 0.85rem;
    background: #1e2127;
    border: 1px solid #3b4043;
    border-radius: 8px;
    z-index: 10;
    scrollbar-width: thin;
    scrollbar-color: #3b4043 transparent;
  }
  .spectrum-sidebar::-webkit-scrollbar { width: 6px; }
  .spectrum-sidebar::-webkit-scrollbar-thumb { background: #3b4043; border-radius: 3px; }
  .spectrum-sidebar::-webkit-scrollbar-track { background: transparent; }

  .spectrum-sidebar-title {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 1.25rem;
  }
  .spectrum-sidebar-title a,
  .spectrum-sidebar-title a:visited { color: #d19a66; text-decoration: none; }
  .spectrum-sidebar-title a:hover { color: #e5b07a; }

  .spectrum-sidebar nav a {
    display: block;
    padding: 0.2rem 0;
    padding-left: 0.6rem;
    font-size: 0.78rem;
    color: #71717a;
    text-decoration: none;
    border-left: 2px solid transparent;
    transition: color 0.15s;
    line-height: 1.35;
  }
  .spectrum-sidebar nav a:hover { color: #e0e0e4; text-decoration: none; }
  .spectrum-sidebar nav a.active { color: #d19a66; border-left-color: #d19a66; }
  .spectrum-sidebar nav a.toc-h3 { padding-left: 1.2rem; font-size: 0.74rem; }

  /* ---- Content area (no layout changes to section#posts) ---- */
  .spectrum-wrap { max-width: 100%; }

  /* ---- Hamburger button (hidden until JS populates sidebar) ---- */
  .spectrum-toggle {
    display: none !important;
    position: fixed;
    top: 1rem;
    left: 1rem;
    z-index: 200;
    background: #21252b;
    border: 1px solid #3b4043;
    border-radius: 6px;
    color: #adbac3;
    font-size: 1.4rem;
    width: 40px;
    height: 40px;
    cursor: pointer;
    line-height: 1;
  }

  /* ---- Mobile overlay ---- */
  .spectrum-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 50;
  }
  .spectrum-overlay.show { display: block; }

  /* ---- When viewport too narrow for margin sidebar, switch to hamburger ---- */
  @media (max-width: 1240px) {
    .spectrum-toggle { display: none !important; }
    .spectrum-sidebar {
      left: 0;
      width: 280px;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 200;
    }
    .spectrum-sidebar.open { transform: translateX(0); }
  }

  /* ---- Typography ---- */
  .spectrum-wrap h1 { font-size: 1.75em; margin-bottom: 5px; color: #61afef; }
  .spectrum-wrap h1 .section-number { color: #d19a66; font-weight: 400; }
  .spectrum-wrap h2 {
    font-size: 1.35em; color: #61afef; margin-top: 2.5em; margin-bottom: 0.75em;
    padding-bottom: 0.3em; border-bottom: 1px solid #3b4043;
  }
  .spectrum-wrap h3 { font-size: 1.1em; color: #adbac3; margin-top: 1.75em; margin-bottom: 0.6em; }
  .spectrum-wrap h4 { font-size: 1em; color: #adbac3; margin-top: 1.25em; margin-bottom: 0.4em; }
  .spectrum-wrap p { margin-bottom: 0.9em; line-height: 1.7; }
  .spectrum-wrap ul, .spectrum-wrap ol { padding-left: 25px; margin: 10px 0; }
  .spectrum-wrap li { margin: 5px 0; line-height: 1.6; }
  .spectrum-wrap strong { color: #e0e0e4; }
  .spectrum-wrap hr { border: none; border-top: 1px solid #3b4043; margin: 2.5em 0; }

  /* ---- Code ---- */
  .spectrum-wrap code {
    font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
    font-size: 0.875em;
  }
  .spectrum-wrap :not(pre) > code {
    background: #21252b; padding: 2px 6px; border-radius: 3px; color: #d19a66;
  }
  .spectrum-wrap pre {
    background: #21252b; border: 1px solid #3b4043; border-radius: 8px;
    padding: 18px; overflow-x: auto; margin: 15px 0; line-height: 1.5;
  }
  .spectrum-wrap pre code {
    background: none; padding: 0; color: #adbac3; display: block;
  }
  .spectrum-wrap .hljs { background: transparent !important; padding: 0 !important; }

  /* ---- Track tags ---- */
  .spectrum-wrap .tag {
    display: inline-block; font-size: 0.7em; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 0.15em 0.6em; border-radius: 4px; vertical-align: middle; margin-left: 0.4em;
  }
  .spectrum-wrap .tag-ios  { background: #3b82f615; color: #3b82f6; border: 1px solid #3b82f6; }
  .spectrum-wrap .tag-dsp  { background: #f59e0b15; color: #f59e0b; border: 1px solid #f59e0b; }
  .spectrum-wrap .tag-both { background: #a855f715; color: #a855f7; border: 1px solid #a855f7; }

  /* ---- Callout boxes ---- */
  .spectrum-wrap .callout {
    border-radius: 8px; padding: 15px 20px; margin: 20px 0; border-left: 4px solid;
  }
  .spectrum-wrap .callout-title {
    font-weight: 700; font-size: 0.85em; text-transform: uppercase;
    letter-spacing: 0.04em; margin-bottom: 0.4em;
  }
  .spectrum-wrap .callout-ios  { background: #21252b; border-color: #3b82f6; }
  .spectrum-wrap .callout-ios .callout-title { color: #3b82f6; }
  .spectrum-wrap .callout-dsp  { background: #21252b; border-color: #f59e0b; }
  .spectrum-wrap .callout-dsp .callout-title { color: #f59e0b; }
  .spectrum-wrap .callout-both { background: #21252b; border-color: #a855f7; }
  .spectrum-wrap .callout-both .callout-title { color: #a855f7; }
  .spectrum-wrap .callout-tip  { background: #21252b; border-color: #61afef; }
  .spectrum-wrap .callout-tip .callout-title { color: #61afef; }

  /* ---- Diagram / ASCII art ---- */
  .spectrum-wrap .diagram {
    background: #21252b; border: 1px solid #3b4043; border-radius: 8px;
    padding: 18px; margin: 15px 0;
    font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
    font-size: 0.85em; line-height: 1.6; white-space: pre; overflow-x: auto;
    color: #9da7b3;
  }
  .spectrum-wrap .diagram em { color: #61afef; font-style: normal; }

  /* ---- Tables ---- */
  .spectrum-wrap table { border-collapse: collapse; margin: 15px 0; width: 100%; font-size: 0.9em; }
  .spectrum-wrap th, .spectrum-wrap td { border: 1px solid #3b4043; padding: 8px 14px; text-align: left; }
  .spectrum-wrap th { background: #21252b; color: #61afef; font-weight: 600; }
  .spectrum-wrap tr:hover td { background: #21252b; }

  /* ---- Checkpoint ---- */
  .spectrum-wrap .checkpoint {
    background: #21252b; border: 1px solid #61afef40; border-radius: 8px;
    padding: 20px; margin: 25px 0;
  }
  .spectrum-wrap .checkpoint-title { font-weight: 700; color: #61afef; margin-bottom: 0.4em; }

  /* ---- Section navigation ---- */
  .spectrum-wrap .section-nav {
    display: flex; justify-content: space-between; margin: 35px 0 10px;
    padding-top: 20px; border-top: 1px solid #3b4043;
  }
  .spectrum-wrap .section-nav a {
    color: #d19a66; text-decoration: none; padding: 10px 18px;
    background: #21252b; border-radius: 6px; font-size: 0.9em;
  }
  .spectrum-wrap .section-nav a:hover { background: #2c313a; }

  /* ---- Index page styles ---- */
  .spectrum-wrap .hero { text-align: center; margin-bottom: 2.5em; }
  .spectrum-wrap .hero h1 { font-size: 1.75em; margin-bottom: 0.5em; }
  .spectrum-wrap .hero .subtitle { color: #9da7b3; font-size: 1.05em; margin-bottom: 1.5em; }
  .spectrum-wrap .hero .tech-stack { display: flex; gap: 0.6em; justify-content: center; flex-wrap: wrap; }
  .spectrum-wrap .hero .tech-stack span {
    font-size: 0.8em; padding: 0.25em 0.7em; border-radius: 999px; border: 1px solid #3b4043; color: #9da7b3;
  }
  .spectrum-wrap .arc-label {
    color: #d19a66; font-size: 0.85em; text-transform: uppercase;
    letter-spacing: 2px; margin: 30px 0 12px; font-weight: bold;
    padding-bottom: 8px; border-bottom: 1px solid #3b4043;
  }
  .spectrum-wrap .section-list { list-style: none; padding: 0; }
  .spectrum-wrap .section-list li { margin: 8px 0; }
  .spectrum-wrap .section-list a {
    display: flex; align-items: baseline; gap: 15px;
    padding: 14px 18px; background: #21252b; border-radius: 10px;
    color: #adbac3; text-decoration: none; transition: all 0.2s;
    border: 1px solid transparent;
  }
  .spectrum-wrap .section-list a:hover { background: #2c313a; border-color: #61afef; transform: translateX(5px); }
  .spectrum-wrap .section-num {
    font-family: 'SF Mono', Consolas, monospace; font-size: 0.85em;
    color: #d19a66; min-width: 1.8em; text-align: right;
  }
  .spectrum-wrap .section-info .title { font-weight: bold; font-size: 1.05em; color: #61afef; }
  .spectrum-wrap .section-info .desc { font-size: 0.85em; color: #9da7b3; margin-top: 3px; }
  .spectrum-wrap .index-footer {
    text-align: center; margin-top: 2.5em; padding-top: 1.5em;
    border-top: 1px solid #3b4043; color: #9da7b3; font-size: 0.85em;
  }

  /* ---- Small screens ---- */
  @media (max-width: 860px) {
    .spectrum-wrap .section-nav { flex-direction: column; gap: 8px; }
    .spectrum-wrap .section-nav a { text-align: center; }
    .spectrum-wrap pre { font-size: 0.8em; padding: 12px; }
  }

  @media print {
    .spectrum-sidebar, .spectrum-toggle, .spectrum-overlay { display: none !important; }
  }
</style>

<button class="spectrum-toggle" aria-label="Toggle navigation">&#9776;</button>
<div class="spectrum-overlay"></div>
<aside class="spectrum-sidebar">
  <div class="spectrum-sidebar-title">
    <a href="/projects/spectrum-analyzer/tutorial/">Spectrum Analyzer Tutorial</a>
  </div>
  <nav></nav>
</aside>

<div class="spectrum-wrap">
{{ content }}
</div>

<script>
  // Highlight.js init
  if (typeof hljs !== 'undefined') {
    document.querySelectorAll('.spectrum-wrap pre code').forEach(function(block) {
      hljs.highlightElement(block);
    });
  }

  // Sidebar: TOC generation, scroll tracking, mobile toggle
  (function() {
    var wrap = document.querySelector('.spectrum-wrap');
    var nav = document.querySelector('.spectrum-sidebar nav');
    var sidebar = document.querySelector('.spectrum-sidebar');
    if (!wrap || !nav || !sidebar) return;

    // Align sidebar with content start
    var rect = wrap.getBoundingClientRect();
    sidebar.style.top = rect.top + window.scrollY + 'px';

    var headings = wrap.querySelectorAll('h2[id], h3[id]');

    if (headings.length >= 2) {
      // Section page: build TOC from headings
      headings.forEach(function(h) {
        var a = document.createElement('a');
        a.href = '#' + h.id;
        var clone = h.cloneNode(true);
        var tags = clone.querySelectorAll('.tag');
        tags.forEach(function(t) { t.remove(); });
        a.textContent = clone.textContent.trim();
        if (h.tagName === 'H3') a.classList.add('toc-h3');
        nav.appendChild(a);
      });

      // Scroll tracking
      var links = nav.querySelectorAll('a');
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            var id = entry.target.id;
            links.forEach(function(a) {
              a.classList.toggle('active', a.getAttribute('href') === '#' + id);
            });
          }
        });
      }, { rootMargin: '-80px 0px -70% 0px', threshold: 0 });
      headings.forEach(function(h) { observer.observe(h); });

    } else {
      // Index page: build section links from .section-list
      var sectionLinks = wrap.querySelectorAll('.section-list a');
      if (sectionLinks.length > 0) {
        sectionLinks.forEach(function(link) {
          var a = document.createElement('a');
          a.href = link.getAttribute('href');
          var numEl = link.querySelector('.section-num');
          var titleEl = link.querySelector('.title');
          a.textContent = (numEl ? numEl.textContent + '. ' : '') +
                          (titleEl ? titleEl.textContent : link.textContent.trim());
          nav.appendChild(a);
        });
      }
    }

    // Show sidebar + hamburger only if sidebar has content
    var toggle = document.querySelector('.spectrum-toggle');
    if (nav.children.length > 0) {
      sidebar.style.display = 'block';
      if (toggle) toggle.classList.add('has-toc');
    }
    var overlay = document.querySelector('.spectrum-overlay');

    if (toggle) {
      toggle.addEventListener('click', function() {
        sidebar.classList.toggle('open');
        if (overlay) overlay.classList.toggle('show');
      });
    }
    if (overlay) {
      overlay.addEventListener('click', function() {
        sidebar.classList.remove('open');
        overlay.classList.remove('show');
      });
    }
    nav.addEventListener('click', function(e) {
      if (e.target.tagName === 'A' && window.innerWidth <= 1240) {
        sidebar.classList.remove('open');
        if (overlay) overlay.classList.remove('show');
      }
    });
  })();
</script>

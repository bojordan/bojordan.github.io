<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/11.0.0/css/fabric.min.css">
    <script>
      (function() {
        var pref = localStorage.getItem('theme');
        var resolved = pref === 'light' || pref === 'dark' ? pref :
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', resolved);
      })();
    </script>
  </head>
  <body>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
    <div id="mastheadbackground">
      <div id="masthead">
          <h1><a href="/">130 Widgets</a></h1>
          <div>
              <p id="description">
                  Building tools. Learning to build tools. Learning to build learning tools.
              </p>

              <nav>
                  <a href="/about">about me</a> • <a href="/best-of">best of</a> • <a href="/archives">archives</a> • <a href="https://github.com/bojordan/bojordan.github.io">this</a> • <a rel="me" href="https://discuss.systems/@bojordan">mastodon</a>
              </nav>
          </div>
      </div>
    </div>
    <section id="posts">
    {{ content }}
    </section>
    <div class="wrapper-footer">
        <div class="container">
          <footer class="footer">© Copyright 2026, Bo Jordan</footer>
        </div>
    </div>
    <script>
      (function() {
        var btn = document.getElementById('theme-toggle');
        var pref = localStorage.getItem('theme') || 'system';
        var icons = {
          light: '<i class="ms-Icon ms-Icon--ClearNight" aria-hidden="true"></i>',
          dark: '<i class="ms-Icon ms-Icon--Sunny" aria-hidden="true"></i>',
          system: '<i class="ms-Icon ms-Icon--CircleHalfFull" aria-hidden="true"></i>'
        };
        var cycle = { light: 'dark', dark: 'system', system: 'light' };

        function systemTheme() {
          return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function apply(p) {
          pref = p;
          var resolved = p === 'system' ? systemTheme() : p;
          document.documentElement.setAttribute('data-theme', resolved);
          btn.innerHTML = icons[p];
          var hljsLink = document.getElementById('hljs-theme');
          if (hljsLink) {
            hljsLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-' + resolved + '.min.css';
          }
        }

        apply(pref);
        btn.addEventListener('click', function() {
          var next = cycle[pref];
          localStorage.setItem('theme', next);
          apply(next);
        });

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
          if (pref === 'system') apply('system');
        });
      })();
    </script>
  </body>
</html>
